name: Act Test

on:
  workflow_dispatch:

jobs:
  create:
    runs-on: ubuntu-latest
    outputs:
      service_uuid: ${{ steps.deploy.outputs.service_uuid }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create Coolify service
        id: deploy
        uses: ./
        with:
          coolify_domain: ${{ vars.COOLIFY_DOMAIN }}
          api_token: ${{ secrets.COOLIFY_API_TOKEN }}
          docker_compose: test/compose.yml
          project_uuid: ${{ vars.TEST_PROJECT_UUID }}
          server_uuid: ${{ vars.TEST_SERVER_UUID }}
          environment_name_or_uuid: ${{ vars.TEST_ENVIRONMENT_UUID }}
          service_options: |
            {
              "name": "act-test-service",
              "description": "Act test service"
            }
          environment_variables: |
            [
              { "key": "NODE_ENV", "value": "test", "is_secret": false },
              { "key": "API_TOKEN", "value": "secret-value", "is_secret": true }
            ]

  update:
    needs: create
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Update Coolify service
        id: deploy
        uses: ./
        with:
          coolify_domain: ${{ vars.COOLIFY_DOMAIN }}
          api_token: ${{ secrets.COOLIFY_API_TOKEN }}
          docker_compose: test/compose.yml
          service_uuid: ${{ needs.create.outputs.service_uuid }}
          service_options: |
            {
              "name": "act-test-service-updated",
              "description": "Updated via act",
              "urls": [
                { "name": "web", "url": "https://example.test" }
              ]
            }
