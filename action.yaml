name: Coolify Docker Compose Deploy
description: Create or update a Coolify Docker Compose service, sync environment variables, and restart the service.
branding:
  icon: upload-cloud
  color: green

inputs:
  coolify_domain:
    description: |-
      Coolify domain or base URL.

      Use `app.coolify.io` for Coolify Cloud, or your self-hosted Coolify domain.
      If the protocol is omitted, `https://` is used.
      The action appends `/api/v1` automatically unless it is already present.
    required: false
    default: app.coolify.io
  api_token:
    description: Coolify API token.
    required: true
  docker_compose:
    description: |-
      Docker Compose file content or path to a compose file.

      If the value matches an existing file path, the file is read automatically.
      Otherwise, the value is treated as raw Docker Compose content.
    required: true
  environment_variables:
    description: |-
      Service environment variables as a JSON array.

      Each entry must include `key`, `value`, and `is_secret`.
    required: false
  project_uuid:
    description: Project UUID. Required when `service_uuid` is not provided.
    required: false
  server_uuid:
    description: Server UUID. Required when `service_uuid` is not provided.
    required: false
  environment_name_or_uuid:
    description: Environment name or UUID. Required when `service_uuid` is not provided.
    required: false
  service_uuid:
    description: |-
      Existing Coolify service UUID.

      If provided, the action updates this service and returns the same UUID.
      If omitted, the action creates a new Docker Compose service and returns the new UUID.
    required: false
  optional_options:
    description: |-
      JSON object merged into the Coolify create/update service request body.

      Use this for Coolify fields such as `name`, `description`, `destination_uuid`,
      `instant_deploy`, `urls`, `connect_to_docker_network`, or any other
      request-body field supported by Coolify.
    required: false
  request_timeout_ms:
    description: HTTP request timeout in milliseconds.
    required: false
    default: '30000'
  request_retry_count:
    description: |-
      Number of times to retry timed-out or unknown transport errors.

      HTTP response errors from Coolify are not retried.
    required: false
    default: '0'

outputs:
  service_uuid:
    description: Coolify service UUID.
  created:
    description: Whether the action created a new service.

runs:
  using: node24
  main: dist/index.mjs